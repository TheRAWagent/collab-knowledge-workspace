apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cache
  template:
    metadata:
      labels:
        app: cache
    spec:
      containers:
        - args:
            - redis-server
            - --protected-mode
            - "no"
          image: "192.168.29.125/prod/redis:8"
          imagePullPolicy: Always
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            failureThreshold: 5
            periodSeconds: 30
            timeoutSeconds: 5
          name: cache
          resources:
            requests:
              memory: "64Mi"
              cpu: "256m"
            limits:
              memory: "128Mi"
              cpu: "512m"
      restartPolicy: Always
      imagePullSecrets:
        - name: registry-secret
