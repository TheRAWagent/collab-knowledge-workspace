apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: ai-service-configmap
            - secretRef:
                name: ai-service-secrets
          image: "192.168.29.125/prod/ai-service:0.0.1-SNAPSHOT"
          imagePullPolicy: Always
          name: ai-service
          resources:
            limits:
              memory: "768Mi"
              cpu: "1000m"
            requests:
              memory: "512Mi"
              cpu: "900m"
      imagePullSecrets:
        - name: registry-secret
      restartPolicy: Always
