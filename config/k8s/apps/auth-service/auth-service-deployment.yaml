apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: auth-service-configmap
            - secretRef:
                name: auth-service-secrets
          image: '192.168.29.125/prod/auth-service:0.0.1-SNAPSHOT'
          name: auth-service
          imagePullPolicy: Always
          resources:
            limits:
              memory: "768Mi"
              cpu: "1000m"
            requests:
              memory: "512Mi"
              cpu: "1000m"
      restartPolicy: Always
      imagePullSecrets:
        - name: registry-secret
