apiVersion: v1
kind: Secret
metadata:
  name: workspace-service-secrets
type: Opaque
data:
  # Base64 encoded values
  SPRING_DATASOURCE_USERNAME: <ENCODED_USERNAME>
  SPRING_DATASOURCE_PASSWORD: <ENCODED_PASSWORD>
  SPRING_DATASOURCE_URL: <ENCODED_URL>
  AWS_ACCESS_KEY_ID: <ENCODED_ACCESS_KEY>
  AWS_SECRET_ACCESS_KEY: <ENCODED_SECRET_KEY>
