spring:
  main:
    lazy-initialization: true
  task:
    execution:
      pool:
        core-size: 5
        max-size: 20
        queue-capacity: 100
  datasource:
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000
  application:
    name: ai-service
  threads:
    virtual:
      enabled: true
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[http.server.requests]": false
    enable:
      all: false
      "[http.server.requests]": true
      "[process.cpu]": true
      "[jvm.memory.used]": true
      "[hikaricp.connections]": true
