spring:
  main:
    lazy-initialization: true
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      initialization-fail-timeout: 0
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 600000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
  cache:
    cache-names:
      - "users"
    redis:
      time-to-live: 10m
    type: ${SPRING_CACHE_TYPE:simple}
  threads:
    virtual:
      enabled: true
  data:
    redis:
      repositories:
        enabled: false
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  grpc:
    client:
      channels:
        user-service:
          address: ${USER_SERVICE_ADDRESS:ckw-user-service}:${USER_SERVICE_GRPC_PORT:9090}
          negotiation-type: plaintext

server:
  port: 8080
logging:
  config: classpath:logback-spring.xml
  level:
    root: info
    "[com.dj.ckw.authservice]": DEBUG
  structured:
    format:
      console: logstash
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[http.server.requests]": false
    enable:
      all: false
      "[http.server.requests]": true
      "[process.cpu]": true
      "[jvm.memory.used]": true
      "[hikaricp.connections]": true
